/* ============================================================
   ELECTROMANAGER - MODERN DARK THEME CSS
   ============================================================ */
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-card: #1e293b;
  --bg-hover: #334155;
  --bg-input: #0f172a;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --accent-dark: #1d4ed8;
  --success: #22c55e;
  --success-bg: rgba(34,197,94,0.15);
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.15);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.15);
  --info: #06b6d4;
  --info-bg: rgba(6,182,212,0.15);
  --border: #334155;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -1px rgba(0,0,0,0.2);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4), 0 4px 6px -2px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-width: 260px;
  --header-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   LAYOUT
   ============================================================ */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: var(--transition);
  overflow-y: auto;
}

.sidebar.collapsed { transform: translateX(-100%); }

.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }

.sidebar-brand {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.brand-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.brand-text p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.sidebar-nav { flex: 1; padding: 12px 10px; }

.nav-section { margin-bottom: 8px; }
.nav-section-title {
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  margin: 2px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent); color: white; }
.nav-item .nav-icon { width: 20px; text-align: center; font-size: 16px; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.sync-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  padding: 8px 12px;
  background: var(--bg-primary);
  border-radius: var(--radius-sm);
}

.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}
.sync-dot.offline { background: var(--warning); animation: none; }
.sync-dot.syncing { background: var(--accent); animation: spin 1s linear infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes spin { to { transform: rotate(360deg); } }

/* Main Content */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: var(--transition);
}

/* Header */
.top-header {
  height: var(--header-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.menu-toggle {
  display: none;
  background: none; border: none;
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: var(--radius-sm);
}
.menu-toggle:hover { background: var(--bg-hover); }

.page-title { font-size: 20px; font-weight: 700; }

.header-right { display: flex; align-items: center; gap: 12px; }

.header-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: var(--transition);
}
.header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.header-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.header-btn.primary:hover { background: var(--accent-dark); }

/* Content Area */
.content-area {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.revenue::before { background: linear-gradient(90deg, var(--success), #4ade80); }
.stat-card.sales::before { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
.stat-card.stock::before { background: linear-gradient(90deg, var(--warning), #fbbf24); }
.stat-card.credit::before { background: linear-gradient(90deg, var(--danger), #f87171); }

.stat-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

.stat-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.stat-card.revenue .stat-icon { background: var(--success-bg); }
.stat-card.sales .stat-icon { background: var(--info-bg); }
.stat-card.stock .stat-icon { background: var(--warning-bg); }
.stat-card.credit .stat-icon { background: var(--danger-bg); }

.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.stat-change {
  font-size: 12px;
  font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.stat-change.up { color: var(--success); }
.stat-change.down { color: var(--danger); }

/* Dashboard Sections */
.dashboard-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}

@media (max-width: 1024px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}

.card-body { padding: 16px 20px; }

/* Chart placeholder */
.chart-container {
  height: 280px;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  gap: 8px;
  padding: 20px 0;
}

.chart-bar {
  flex: 1;
  max-width: 60px;
  background: linear-gradient(180deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  position: relative;
  transition: var(--transition);
  min-height: 20px;
}
.chart-bar:hover { filter: brightness(1.2); }

.chart-bar-label {
  position: absolute;
  bottom: -24px;
  left: 50%; transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}

.chart-bar-value {
  position: absolute;
  top: -20px;
  left: 50%; transform: translateX(-50%);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}

/* Low Stock List */
.stock-alert-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.stock-alert-item:last-child { border-bottom: none; }

.stock-alert-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.stock-alert-info p { font-size: 11px; color: var(--text-muted); }

.stock-alert-qty {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--danger-bg);
  color: var(--danger);
}

/* ============================================================
   TABLES
   ============================================================ */
.table-container {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead {
  background: var(--bg-secondary);
  position: sticky;
  top: 0;
  z-index: 10;
}

th {
  padding: 12px 16px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}

tr:hover td { background: var(--bg-hover); }
tr:last-child td { border-bottom: none; }

.td-name { font-weight: 600; color: var(--text-primary); }
.td-amount { font-weight: 600; color: var(--text-primary); font-family: 'SF Mono', monospace; }
.td-qty { font-weight: 600; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-info { background: var(--info-bg); color: var(--info); }

/* ============================================================
   FORMS
   ============================================================ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-group label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  transition: var(--transition);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--text-muted); }

.form-group textarea { min-height: 80px; resize: vertical; }

.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-dark); }

.btn-success { background: var(--success); color: white; }
.btn-success:hover { filter: brightness(0.9); }

.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { filter: brightness(0.9); }

.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-hover); }

.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.95) translateY(10px);
  transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: scale(1) translateY(0); }

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title { font-size: 18px; font-weight: 700; }

.modal-close {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 24px;
  cursor: pointer;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

.modal-body { padding: 24px; }

/* ============================================================
   SEARCH & FILTERS
   ============================================================ */
.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.search-input-wrapper {
  flex: 1;
  min-width: 240px;
  position: relative;
}

.search-input-wrapper input {
  width: 100%;
  padding: 10px 14px 10px 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
}

.search-input-wrapper .search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
}

/* ============================================================
   INVOICE PRINT
   ============================================================ */
.invoice-print {
  background: white;
  color: #1a1a1a;
  padding: 40px;
  max-width: 800px;
  margin: 0 auto;
}

.invoice-print .invoice-header {
  text-align: center;
  border-bottom: 2px solid #333;
  padding-bottom: 20px;
  margin-bottom: 20px;
}

.invoice-print h2 { font-size: 24px; margin-bottom: 4px; }
.invoice-print p { font-size: 12px; color: #666; }

.invoice-print table { color: #333; font-size: 12px; }
.invoice-print th { color: #333; border-color: #ddd; }
.invoice-print td { border-color: #ddd; }

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
.toast-container {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  max-width: 400px;
}

@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.warning { border-left: 3px solid var(--warning); }
.toast.info { border-left: 3px solid var(--info); }

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  overflow-x: auto;
}

.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }
.empty-state p { font-size: 13px; }

/* ============================================================
   SETTINGS PANEL
   ============================================================ */
.settings-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}

.settings-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}

/* ============================================================
   BILLING / POS STYLE
   ============================================================ */
.bill-container {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
}

@media (max-width: 1024px) {
  .bill-container { grid-template-columns: 1fr; }
}

.bill-cart {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: sticky;
  top: calc(var(--header-height) + 24px);
  height: fit-content;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.cart-item-info h4 { font-size: 13px; font-weight: 600; }
.cart-item-info p { font-size: 11px; color: var(--text-muted); }

.cart-qty-control {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cart-qty-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-primary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.cart-total {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 2px solid var(--border);
}

.cart-total-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
}

.cart-total-row.grand {
  font-size: 18px;

<script>
// ============================================================
// ELECTROMANAGER - COMPLETE APP JAVASCRIPT
// ============================================================

const APP = {
  version: '1.0.0',
  dbName: 'ElectroManagerDB',
  dbVersion: 1,
  db: null,
  sheetsURL: (() => { try { return localStorage.getItem('sheetsURL') || ''; } catch(e) { return ''; } })(),  settings: {},
  data: {
    products: [],
    sales: [],
    purchases: [],
    customers: [],
    suppliers: [],
    expenses: [],
    payments: [],
    returns: [],
    users: []
  },
  cart: [],
  currentPage: 'dashboard',
  isOnline: navigator.onLine,
  isSyncing: false,
  pendingSync: []
};

// ============================================================
// INDEXEDDB SETUP
// ============================================================
const DB = {
  async init() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(APP.dbName, APP.dbVersion);

      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        APP.db = request.result;
        resolve(APP.db);
      };

      request.onupgradeneeded = (event) => {
        const db = event.target.result;

        const stores = ['products', 'sales', 'purchases', 'customers', 'suppliers', 'expenses', 'payments', 'returns', 'settings', 'pendingSync'];
        stores.forEach(store => {
          if (!db.objectStoreNames.contains(store)) {
            db.createObjectStore(store, { keyPath: 'id' });
          }
        });
      };
    });
  },

  async getAll(store) {
    return new Promise((resolve, reject) => {
      const tx = APP.db.transaction(store, 'readonly');
      const st = tx.objectStore(store);
      const request = st.getAll();
      request.onsuccess = () => resolve(request.result || []);
      request.onerror = () => reject(request.error);
    });
  },

  async get(store, id) {
    return new Promise((resolve, reject) => {
      const tx = APP.db.transaction(store, 'readonly');
      const st = tx.objectStore(store);
      const request = st.get(id);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  },

  async put(store, data) {
    return new Promise((resolve, reject) => {
      const tx = APP.db.transaction(store, 'readwrite');
      const st = tx.objectStore(store);
      const request = st.put(data);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  },

  async delete(store, id) {
    return new Promise((resolve, reject) => {
      const tx = APP.db.transaction(store, 'readwrite');
      const st = tx.objectStore(store);
      const request = st.delete(id);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  },

  async clear(store) {
    return new Promise((resolve, reject) => {
      const tx = APP.db.transaction(store, 'readwrite');
      const st = tx.objectStore(store);
      const request = st.clear();
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }
};

// ============================================================
// UTILITIES
// ============================================================
const Utils = {
  generateId(prefix) {
    const now = new Date();
    const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '-' + 
               String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
    return prefix + '-' + ts + '-' + Math.floor(Math.random() * 1000);
  },

  formatCurrency(amount) {
    const currency = APP.settings.currency || '₹';
    return currency + ' ' + (parseFloat(amount) || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  },

  formatDate(date) {
    if (!date) return '-';
    const d = new Date(date);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  },

  formatDateTime(date) {
    if (!date) return '-';
    const d = new Date(date);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  },

  escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },

  debounce(fn, delay) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), delay);
    };
  },

  downloadCSV(filename, headers, rows) {
   const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))].join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
  },

  getToday() {
    return new Date().toISOString().split('T')[0];
  },

  calculateGST(amount, percent) {
    return (parseFloat(amount) || 0) * (parseFloat(percent) || 0) / 100;
  }
};

// ============================================================
// TOAST NOTIFICATIONS
// ============================================================
const Toast = {
  container: document.getElementById('toastContainer'),

  show(message, type = 'info', duration = 3000) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
    toast.innerHTML = `<span style="font-size:16px">${icons[type]}</span><span>${Utils.escapeHtml(message)}</span>`;
    this.container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }
};

// ============================================================
// SYNC ENGINE
// ============================================================
const Sync = {
  async init() {
    window.addEventListener('online', () => {
      APP.isOnline = true;
      app.updateSyncStatus();
      this.syncPending();
    });
    window.addEventListener('offline', () => {
      APP.isOnline = false;
      app.updateSyncStatus();
    });
  },

  async syncPending() {
    if (!APP.isOnline || !APP.sheetsURL || APP.isSyncing) return;

    const pending = await DB.getAll('pendingSync');
    if (pending.length === 0) return;

    APP.isSyncing = true;
    app.updateSyncStatus();

    try {
      for (const item of pending) {
        const response = await fetch(APP.sheetsURL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item.data)
        });

        if (response.ok) {
          await DB.delete('pendingSync', item.id);
        }
      }
      Toast.show('Sync completed!', 'success');
    } catch (err) {
      console.error('Sync error:', err);
      Toast.show('Sync failed. Will retry.', 'warning');
    } finally {
      APP.isSyncing = false;
      app.updateSyncStatus();
    }
  },

  async queue(data) {
    const id = Utils.generateId('PENDING');
    await DB.put('pendingSync', { id, data, timestamp: new Date().toISOString() });
    if (APP.isOnline) this.syncPending();
  },

  async fetchFromSheets(action) {
    if (!APP.isOnline || !APP.sheetsURL) return null;

    try {
      const response = await fetch(`${APP.sheetsURL}?action=${action}`);
      if (!response.ok) throw new Error('Network error');
      return await response.json();
    } catch (err) {
      console.error('Fetch error:', err);
      return null;
    }
  },

  async pushToSheets(data) {
    if (!APP.isOnline || !APP.sheetsURL) {
      await this.queue(data);
      return { queued: true };
    }

    try {
      const response = await fetch(APP.sheetsURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    } catch (err) {
      await this.queue(data);
      return { queued: true, error: err.message };
    }
  }
};

// ============================================================
// DATA MANAGEMENT
// ============================================================
const DataManager = {
  async loadAll() {
    APP.data.products = await DB.getAll('products');
    APP.data.sales = await DB.getAll('sales');
    APP.data.purchases = await DB.getAll('purchases');
    APP.data.customers = await DB.getAll('customers');
    APP.data.suppliers = await DB.getAll('suppliers');
    APP.data.expenses = await DB.getAll('expenses');
    APP.data.payments = await DB.getAll('payments');
    APP.data.returns = await DB.getAll('returns');

    const settingsArr = await DB.getAll('settings');
    APP.settings = {};
    settingsArr.forEach(s => { APP.settings[s.key] = s.value; });

    // Default settings
    if (!APP.settings.shopName) APP.settings.shopName = 'Your Electric Shop';
    if (!APP.settings.currency) APP.settings.currency = '₹';
    if (!APP.settings.invoicePrefix) APP.settings.invoicePrefix = 'INV';
    if (!APP.settings.defaultGST) APP.settings.defaultGST = '18';
    if (!APP.settings.lowStockAlert) APP.settings.lowStockAlert = '10';
  },

  async addProduct(product) {
    product.id = Utils.generateId('PROD');
    product.createdAt = new Date().toISOString();
    product.updatedAt = product.createdAt;
    await DB.put('products', product);
    APP.data.products.push(product);

    await Sync.pushToSheets({
      action: 'addProduct',
      ...product
    });
    return product;
  },

  async updateProduct(id, updates) {
    const product = APP.data.products.find(p => p.id === id);
    if (!product) return null;
    Object.assign(product, updates, { updatedAt: new Date().toISOString() });
    await DB.put('products', product);

    await Sync.pushToSheets({
      action: 'updateProduct',
      id,
      updates
    });
    return product;
  },

  async deleteProduct(id) {
    await DB.delete('products', id);
    APP.data.products = APP.data.products.filter(p => p.id !== id);

    await Sync.pushToSheets({
      action: 'deleteProduct',
      id
    });
  },

  async addSale(sale) {
    sale.id = Utils.generateId('SALE');
    sale.createdAt = new Date().toISOString();
    await DB.put('sales', sale);
    APP.data.sales.push(sale);

    // Update product quantity
    if (sale.productID) {
      const product = APP.data.products.find(p => p.id === sale.productID);
      if (product) {
        product.quantity = Math.max(0, (parseFloat(product.quantity) || 0) - (parseFloat(sale.quantity) || 0));
        await DB.put('products', product);
      }
    }

    // Update customer balance if credit
    if (sale.customerID && sale.paymentStatus === 'Credit') {
      const customer = APP.data.customers.find(c => c.id === sale.customerID);
      if (customer) {
        customer.balanceDue = (parseFloat(customer.balanceDue) || 0) + (parseFloat(sale.totalAmount) || 0);
        customer.lastPurchaseDate = sale.date;
        await DB.put('customers', customer);
      }
    }

    await Sync.pushToSheets({
      action: 'addSale',
      ...sale
    });
    return sale;
  },

  async addPurchase(purchase) {
    purchase.id = Utils.generateId('PUR');
    purchase.createdAt = new Date().toISOString();
    await DB.put('purchases', purchase);
    APP.data.purchases.push(purchase);

    // Update product quantity
    if (purchase.productID) {
      const product = APP.data.products.find(p => p.id === purchase.productID);
      if (product) {
        product.quantity = (parseFloat(product.quantity) || 0) + (parseFloat(purchase.quantity) || 0);
        product.costPrice = purchase.unitCost || product.costPrice;
        await DB.put('products', product);
      }
    }

    // Update supplier balance
    if (purchase.supplierID) {
      const supplier = APP.data.suppliers.find(s => s.id === purchase.supplierID);
      if (supplier) {
        const total = parseFloat(purchase.totalCost) || 0;
        const paid = parseFloat(purchase.paidAmount) || 0;
        if (paid < total) {
          supplier.balanceDue = (parseFloat(supplier.balanceDue) || 0) + (total - paid);
        }
        supplier.lastSupplyDate = purchase.date;
        await DB.put('suppliers', supplier);
      }
    }

    await Sync.pushToSheets({
      action: 'addPurchase',
      ...purchase
    });
    return purchase;
  },

  async addCustomer(customer) {
    customer.id = Utils.generateId('CUST');
    customer.createdAt = new Date().toISOString();
    customer.balanceDue = parseFloat(customer.balanceDue) || 0;
    customer.totalPurchases = 0;
    await DB.put('customers', customer);
    APP.data.customers.push(customer);

    await Sync.pushToSheets({
      action: 'addCustomer',
      ...customer
    });
    return customer;
  },

  async updateCustomer(id, updates) {
    const customer = APP.data.customers.find(c => c.id === id);
    if (!customer) return null;
    Object.assign(customer, updates);
    await DB.put('customers', customer);

    await Sync.pushToSheets({
      action: 'updateCustomer',
      id,
      updates
    });
    return customer;
  },

  async addSupplier(supplier) {
    supplier.id = Utils.generateId('SUPP');
    supplier.createdAt = new Date().toISOString();
    supplier.balanceDue = parseFloat(supplier.balanceDue) || 0;
    supplier.totalSupplies = 0;
    await DB.put('suppliers', supplier);
    APP.data.suppliers.push(supplier);

    await Sync.pushToSheets({
      action: 'addSupplier',
      ...supplier
    });
    return supplier;
  },

  async updateSupplier(id, updates) {
    const supplier = APP.data.suppliers.find(s => s.id === id);
    if (!supplier) return null;
    Object.assign(supplier, updates);
    await DB.put('suppliers', supplier);

    await Sync.pushToSheets({
      action: 'updateSupplier',
      id,
      updates
    });
    return supplier;
  },

  async addExpense(expense) {
    expense.id = Utils.generateId('EXP');
    expense.createdAt = new Date().toISOString();
    await DB.put('expenses', expense);
    APP.data.expenses.push(expense);

    await Sync.pushToSheets({
      action: 'addExpense',
      ...expense
    });
    return expense;
  },

  async recordPayment(payment) {
    payment.id = Utils.generateId('PAY');
    payment.createdAt = new Date().toISOString();
    await DB.put('payments', payment);
    APP.data.payments.push(payment);

    // Update balance
    if (payment.entityType === 'Customer') {
      const customer = APP.data.customers.find(c => c.id === payment.entityID);
      if (customer) {
        customer.balanceDue = Math.max(0, (parseFloat(customer.balanceDue) || 0) - (parseFloat(payment.amount) || 0));
        await DB.put('customers', customer);
      }
    } else if (payment.entityType === 'Supplier') {
      const supplier = APP.data.suppliers.find(s => s.id === payment.entityID);
      if (supplier) {
        supplier.balanceDue = Math.max(0, (parseFloat(supplier.balanceDue) || 0) - (parseFloat(payment.amount) || 0));
        await DB.put('suppliers', supplier);
      }
    }

    await Sync.pushToSheets({
      action: 'recordPayment',
      ...payment
    });
    return payment;
  },

  async processReturn(ret) {
    ret.id = Utils.generateId('RET');
    ret.createdAt = new Date().toISOString();
    await DB.put('returns', ret);
    APP.data.returns.push(ret);

    // Restore stock
    if (ret.productID) {
      const product = APP.data.products.find(p => p.id === ret.productID);
      if (product) {
        product.quantity = (parseFloat(product.quantity) || 0) + (parseFloat(ret.quantity) || 0);
        await DB.put('products', product);
      }
    }

    await Sync.pushToSheets({
      action: 'processReturn',
      ...ret
    });
    return ret;
  },

  async saveSettings(settings) {
    for (const [key, value] of Object.entries(settings)) {
      APP.settings[key] = value;
      await DB.put('settings', { id: key, key, value });
    }

    await Sync.pushToSheets({
      action: 'updateSettings',
      settings
    });
  },

  async fullSync() {
    if (!APP.isOnline || !APP.sheetsURL) {
      Toast.show('Cannot sync: No internet or Sheets URL not set', 'warning');
      return;
    }

    APP.isSyncing = true;
    app.updateSyncStatus();
    Toast.show('Syncing with Google Sheets...', 'info');

    try {
      // Push pending first
      await Sync.syncPending();

      // Fetch all data from Sheets
      const result = await Sync.fetchFromSheets('getAll');
      if (result && !result.error) {
        // Update local DB with cloud data
        for (const [store, items] of Object.entries(result)) {
          if (Array.isArray(items)) {
            await DB.clear(store);
            for (const item of items) {
              await DB.put(store, item);
            }
          }
        }
        await this.loadAll();
        Toast.show('Full sync completed!', 'success');
      } else {
        Toast.show('Sync failed: ' + (result?.error || 'Unknown error'), 'error');
      }
    } catch (err) {
      Toast.show('Sync error: ' + err.message, 'error');
    } finally {
      APP.isSyncing = false;
      app.updateSyncStatus();
    }
  }
};

// ============================================================
// MAIN APP CONTROLLER
// ============================================================
const app = {
  searchTimeouts: {},

   async init() {
    try {
      await DB.init();
      await DataManager.loadAll();
      Sync.init();
      const pending = await DB.getAll('pendingSync');
      APP.pendingSync = pending;
      this.updateSyncStatus();
      this.navigate('dashboard');
      
    } catch(err) {
      console.error('App init failed:', err);
      Toast.show('App failed to load: ' + err.message, 'error');
      // Still render dashboard even if DB fails
      this.navigate('dashboard');
    }
  },

    getServiceWorkerCode() {
    return `self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline', {status: 503}))))`;
  },

    

  // Navigation
  navigate(page) {
    APP.currentPage = page;

    // Update sidebar
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (activeNav) activeNav.classList.add('active');

    // Update title
    const titles = {
      dashboard: 'Dashboard',
      pos: 'New Sale',
      products: 'Products',
      'sales-history': 'Sales History',
      purchases: 'Purchases',
      customers: 'Customers',
      suppliers: 'Suppliers',
      expenses: 'Expenses',
      'stock-alerts': 'Stock Alerts',
      returns: 'Returns',
      payments: 'Payments',
      settings: 'Settings',
      backup: 'Backup & Sync'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;

    // Render page
    const content = document.getElementById('contentArea');
    if (Pages[page]) {
      content.innerHTML = Pages[page]();
    } else if (page === 'sales-history') {
      content.innerHTML = Pages.salesHistory();
    } else if (page === 'stock-alerts') {
      content.innerHTML = Pages.stockAlerts();
    } else {
      content.innerHTML = `<div class="empty-state"><h3>Page not found</h3></div>`;
    }

    // Close sidebar on mobile
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    }
  },

  toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  },

  // Sync Status
  updateSyncStatus() {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');

    if (APP.isSyncing) {
      dot.className = 'sync-dot syncing';
      text.textContent = 'Syncing...';
    } else if (!APP.isOnline) {
      dot.className = 'sync-dot offline';
      text.textContent = 'Offline Mode';
    } else {
      dot.className = 'sync-dot';
      const pending = APP.pendingSync?.length || 0;
      text.textContent = pending > 0 ? `Online - ${pending} pending` : 'Online - Synced';
    }
  },

  syncNow() {
    DataManager.fullSync();
  },

  // Modal System
  showModal(type, ...args) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');

    let html = '';
    switch(type) {
      case 'productModal': html = Modals.product(args[0]); break;
      case 'purchaseModal': html = Modals.purchase(args[0]); break;
      case 'customerModal': html = Modals.customer(args[0]); break;
      case 'supplierModal': html = Modals.supplier(args[0]); break;
      case 'expenseModal': html = Modals.expense(); break;
      case 'paymentModal': html = Modals.payment(args[0], args[1], args[2]); break;
      case 'returnModal': html = Modals.ret(); break;
      case 'quickSaleModal': html = Modals.quickSale(); break;
      case 'invoiceModal': html = Modals.invoice(args[0]); break;
      case 'restoreModal': html = Modals.restore(); break;
      default: html = '<div class="modal-body"><p>Unknown modal</p></div>';
    }

    content.innerHTML = html;
    overlay.classList.add('active');
  },

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  },

  // Product Actions
  showProductModal() { this.showModal('productModal'); },

  async saveProduct(id) {
    const product = {
      name: document.getElementById('prodName').value.trim(),
      sku: document.getElementById('prodSKU').value.trim(),
      category: document.getElementById('prodCategory').value,
      subCategory: document.getElementById('prodSubCategory').value.trim(),
      description: document.getElementById('prodDesc').value.trim(),
      quantity: document.getElementById('prodQty').value,
      costPrice: document.getElementById('prodCost').value,
      sellingPrice: document.getElementById('prodPrice').value,
      reorderLevel: document.getElementById('prodReorder').value,
      unit: document.getElementById('prodUnit').value,
      gstPercent: document.getElementById('prodGST').value
    };

    if (!product.name || !product.costPrice || !product.sellingPrice) {
      Toast.show('Please fill required fields (Name, Cost Price, Selling Price)', 'error');
      return;
    }

    try {
      if (id) {
        await DataManager.updateProduct(id, product);
        Toast.show('Product updated!', 'success');
      } else {
        await DataManager.addProduct(product);
        Toast.show('Product added!', 'success');
      }
      this.closeModal();
      this.navigate('products');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  editProduct(id) {
    const product = APP.data.products.find(p => p.id === id);
    if (product) this.showModal('productModal', product);
  },

  async deleteProduct(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    try {
      await DataManager.deleteProduct(id);
      Toast.show('Product deleted!', 'success');
      this.navigate('products');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  // Purchase Actions
  showPurchaseModal(productId) { this.showModal('purchaseModal', productId); },

  updatePurchasePrice() {
    const select = document.getElementById('purProduct');
    const option = select.options[select.selectedIndex];
    if (option && option.dataset.cost) {
      document.getElementById('purUnitCost').value = option.dataset.cost;
      this.calculatePurchaseTotal();
    }
  },

  calculatePurchaseTotal() {
    const qty = parseFloat(document.getElementById('purQty').value) || 0;
    const cost = parseFloat(document.getElementById('purUnitCost').value) || 0;
    const gst = parseFloat(document.getElementById('purGST').value) || 0;
    const subtotal = qty * cost;
    const gstAmount = subtotal * gst / 100;
    document.getElementById('purTotal').value = (subtotal + gstAmount).toFixed(2);
  },

  async savePurchase() {
    const purchase = {
      poNumber: document.getElementById('purPONumber').value.trim(),
      date: document.getElementById('purDate').value,
      supplierID: document.getElementById('purSupplier').value,
      supplierName: document.getElementById('purSupplier').selectedOptions[0]?.text || '',
      productID: document.getElementById('purProduct').value,
      productName: document.getElementById('purProduct').selectedOptions[0]?.text.split(' (Stock')[0] || '',
      quantity: document.getElementById('purQty').value,
      unitCost: document.getElementById('purUnitCost').value,
      totalCost: document.getElementById('purTotal').value,
      gstAmount: (parseFloat(document.getElementById('purTotal').value) || 0) - ((parseFloat(document.getElementById('purQty').value) || 0) * (parseFloat(document.getElementById('purUnitCost').value) || 0)),
      paidAmount: document.getElementById('purPaid').value,
      paymentStatus: document.getElementById('purStatus').value,
      notes: document.getElementById('purNotes').value.trim()
    };

    if (!purchase.productID || !purchase.supplierID) {
      Toast.show('Please select product and supplier', 'error');
      return;
    }

    try {
      await DataManager.addPurchase(purchase);
      Toast.show('Purchase recorded!', 'success');
      this.closeModal();
      this.navigate('purchases');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  // Customer Actions
  showCustomerModal() { this.showModal('customerModal'); },

  async saveCustomer(id) {
    const customer = {
      name: document.getElementById('custName').value.trim(),
      phone: document.getElementById('custPhone').value.trim(),
      email: document.getElementById('custEmail').value.trim(),
      gstin: document.getElementById('custGSTIN').value.trim(),
      creditLimit: document.getElementById('custCredit').value || 0,
      address: document.getElementById('custAddress').value.trim(),
      notes: document.getElementById('custNotes').value.trim()
    };

    if (!customer.name) {
      Toast.show('Customer name is required', 'error');
      return;
    }

    try {
      if (id) {
        await DataManager.updateCustomer(id, customer);
        Toast.show('Customer updated!', 'success');
      } else {
        await DataManager.addCustomer(customer);
        Toast.show('Customer added!', 'success');
      }
      this.closeModal();
      this.navigate('customers');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  editCustomer(id) {
    const customer = APP.data.customers.find(c => c.id === id);
    if (customer) this.showModal('customerModal', customer);
  },

  // Supplier Actions
  showSupplierModal() { this.showModal('supplierModal'); },

  async saveSupplier(id) {

      name: document.getElementById('suppName').value.trim(),

    if (!supplier.name) {
      Toast.show('Supplier name is required', 'error');

  editSupplier(id) {

  // Expense Actions
  showExpenseModal() { this.showModal('expenseModal'); },

  async saveExpense() {
    const expense = {
      date: document.getElementById('expDate').value,
      category: document.getElementById('expCategory').value,
      description: document.getElementById('expDesc').value.trim(),
      amount: document.getElementById('expAmount').value,
      paymentMode: document.getElementById('expMode').value,
      notes: document.getElementById('expNotes').value.trim()
    };

    if (!expense.amount || !expense.description) {
      Toast.show('Amount and description are required', 'error');
      return;
    }

    try {
      await DataManager.addExpense(expense);
      Toast.show('Expense recorded!', 'success');
      this.closeModal();
      this.navigate('expenses');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  // Payment Actions
  recordPayment(entityType, entityID, entityName) {
    this.showModal('paymentModal', entityType, entityID, entityName);
  },

  async savePayment() {
    const payment = {
      date: document.getElementById('payDate').value,
      entityType: document.getElementById('payEntityType').value,
      entityID: document.getElementById('payEntityID').value,
      entityName: document.getElementById('payEntityName').value,

      this.navigate(payment.entityType === 'Customer' ? 'customers' : 'suppliers');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');

  // Return Actions
  showReturnModal() { this.showModal('returnModal'); },

  async saveReturn() {
    const ret = {
      type: document.getElementById('retType').value,
      date: document.getElementById('retDate').value,
      invoiceNo: document.getElementById('retInvoice').value.trim(),
      customerID: document.getElementById('retCustomer').value,
      customerName: document.getElementById('retCustomer').selectedOptions[0]?.text || '',
      productID: document.getElementById('retProduct').value,
      productName: document.getElementById('retProduct').selectedOptions[0]?.text || '',
      quantity: document.getElementById('retQty').value,
      refundAmount: document.getElementById('retRefund').value,
      reason: document.getElementById('retReason').value.trim(),
      status: 'Processed'
    };

    if (!ret.productID) {
      Toast.show('Please select a product', 'error');
      return;
    }

    try {
      await DataManager.processReturn(ret);
      Toast.show('Return processed!', 'success');
      this.closeModal();
      this.navigate('returns');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  // Quick Sale
  updateQuickSalePrice() {
    const select = document.getElementById('qsProduct');
    const option = select.options[select.selectedIndex];
    if (option && option.dataset.price) {
      document.getElementById('qsPrice').value = option.dataset.price;
      this.calculateQuickSaleTotal();
    }
  },

  calculateQuickSaleTotal() {
    const qty = parseFloat(document.getElementById('qsQty').value) || 0;
    const price = parseFloat(document.getElementById('qsPrice').value) || 0;
    const select = document.getElementById('qsProduct');
    const option = select.options[select.selectedIndex];
    const gst = parseFloat(option?.dataset.gst) || parseFloat(APP.settings.defaultGST) || 18;
    const subtotal = qty * price;
    const gstAmount = subtotal * gst / 100;
    document.getElementById('qsTotal').value = (subtotal + gstAmount).toFixed(2);
  },

  async saveQuickSale() {
    const select = document.getElementById('qsProduct');
    const option = select.options[select.selectedIndex];
    const productID = select.value;
    const productName = option?.text.split(' (Stock')[0] || '';
    const qty = parseFloat(document.getElementById('qsQty').value) || 0;
    const unitPrice = parseFloat(document.getElementById('qsPrice').value) || 0;
    const total = parseFloat(document.getElementById('qsTotal').value) || 0;
    const gst = parseFloat(option?.dataset.gst) || parseFloat(APP.settings.defaultGST) || 18;
    const gstAmount = total - (qty * unitPrice);

    const sale = {
      invoiceNo: `${APP.settings.invoicePrefix || 'INV'}-${Date.now().toString().slice(-6)}`,
      date: new Date().toISOString(),
      customerID: document.getElementById('qsCustomer').value,
      customerName: document.getElementById('qsCustomer').selectedOptions[0]?.text || 'Walk-in Customer',
      productID,
      productName,
      quantity: qty,
      unitPrice,
      gstAmount,
      totalAmount: total,
      paymentMode: document.getElementById('qsPayment').value,
      paymentStatus: document.getElementById('qsPayment').value === 'Credit' ? 'Credit' : 'Paid',
      discount: 0
    };

    if (!productID) {
      Toast.show('Please select a product', 'error');
      return;
    }

    try {
      await DataManager.addSale(sale);
      Toast.show('Sale completed!', 'success');
      this.closeModal();
      this.navigate('dashboard');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  // POS Cart
  addToCart(productId) {
    const product = APP.data.products.find(p => p.id === productId);
    if (!product) return;

    const existing = APP.cart.find(item => item.productID === productId);
    if (existing) {
      existing.quantity += 1;
      existing.total = existing.quantity * existing.unitPrice;
    } else {
      const gstPercent = parseFloat(product.gstPercent) || parseFloat(APP.settings.defaultGST) || 18;
      const unitPrice = parseFloat(product.sellingPrice) || 0;
      const qty = 1;
      const subtotal = qty * unitPrice;
      const gstAmount = subtotal * gstPercent / 100;

      APP.cart.push({
        productID: product.id,
        name: product.name,
        unitPrice,
        quantity: qty,
        gstAmount,
        total: subtotal + gstAmount,
        discount: 0
      });
    }

    this.navigate('pos');
    Toast.show('Added to cart!', 'success', 1500);
  },

  updateCartQty(index, delta) {
    const item = APP.cart[index];
    if (!item) return;

    item.quantity = Math.max(1, item.quantity + delta);
    const subtotal = item.quantity * item.unitPrice;
    const gstPercent = parseFloat(APP.data.products.find(p => p.id === item.productID)?.gstPercent) || parseFloat(APP.settings.defaultGST) || 18;
    item.gstAmount = subtotal * gstPercent / 100;
    item.total = subtotal + item.gstAmount;

    this.navigate('pos');
  },

  removeFromCart(index) {
    APP.cart.splice(index, 1);
    this.navigate('pos');
  },

  clearCart() {
    APP.cart = [];
    this.navigate('pos');
  },

  async checkout() {
    if (APP.cart.length === 0) {
      Toast.show('Cart is empty!', 'warning');
      return;
    }

    const customerID = document.getElementById('posCustomer')?.value || '';
    const customerName = document.getElementById('posCustomer')?.selectedOptions[0]?.text || 'Walk-in Customer';
    const paymentMode = document.getElementById('posPaymentMode')?.value || 'Cash';

    try {
      for (const item of APP.cart) {
        const sale = {
          invoiceNo: `${APP.settings.invoicePrefix || 'INV'}-${Date.now().toString().slice(-6)}`,
          date: new Date().toISOString(),
          customerID,
          customerName,
          productID: item.productID,
          productName: item.name,
          quantity: item.quantity,
          unitPrice: item.unitPrice,
          gstAmount: item.gstAmount,
          totalAmount: item.total,
          paymentMode,
          paymentStatus: paymentMode === 'Credit' ? 'Credit' : 'Paid',
          discount: item.discount
        };
        await DataManager.addSale(sale);
      }

      APP.cart = [];
      Toast.show('Sale completed successfully!', 'success');
      this.navigate('dashboard');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  filterPOSProducts(term) {
    const grid = document.getElementById('posProductGrid');
    if (!grid) return;

    const products = APP.data.products.filter(p => {
      if ((parseFloat(p.quantity) || 0) <= 0) return false;
      if (!term) return true;
      const t = term.toLowerCase();
      return (p.name || '').toLowerCase().includes(t) || (p.sku || '').toLowerCase().includes(t);
    });

    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="app.addToCart('${p.id}')">
        <div class="product-card-icon">🔌</div>
        <div class="product-card-name">${Utils.escapeHtml(p.name)}</div>
        <div class="product-card-price">${Utils.formatCurrency(p.sellingPrice)}</div>
        <div class="product-card-stock">${p.quantity} in stock</div>
      </div>
    `).join('') || '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📦</div><h3>No products match</h3></div>';
  },

  // Invoice
  printInvoice(saleId) {
    const sale = APP.data.sales.find(s => s.id === saleId);
    if (sale) this.showModal('invoiceModal', sale);
  },

  // Search
  debouncedSearch(value, page) {
    clearTimeout(this.searchTimeouts[page]);
    this.searchTimeouts[page] = setTimeout(() => {
      const content = document.getElementById('contentArea');
      content.innerHTML = Pages[page](value);
    }, 300);
  },

  // Tabs
  showTab(el, tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tabId)?.classList.add('active');
  },

  // Settings
  async saveSettings() {
    const settings = {
      shopName: document.getElementById('settingShopName').value.trim(),
      shopPhone: document.getElementById('settingShopPhone').value.trim(),
      shopEmail: document.getElementById('settingShopEmail').value.trim(),
      shopGSTIN: document.getElementById('settingShopGSTIN').value.trim(),
      shopAddress: document.getElementById('settingShopAddress').value.trim(),
      currency: document.getElementById('settingCurrency').value.trim() || '₹',
      invoicePrefix: document.getElementById('settingInvoicePrefix').value.trim() || 'INV',
      defaultGST: document.getElementById('settingDefaultGST').value || '18',
      lowStockAlert: document.getElementById('settingLowStock').value || '10'
    };

    const sheetsURL = document.getElementById('settingSheetsURL').value.trim();
    if (sheetsURL) {
      APP.sheetsURL = sheetsURL;
      localStorage.setItem('sheetsURL', sheetsURL);
    }

    try {
      await DataManager.saveSettings(settings);
      Toast.show('Settings saved!', 'success');
    } catch(err) {
      Toast.show('Error: ' + err.message, 'error');
    }
  },

  resetSettings() {
    if (!confirm('Reset all settings to defaults?')) return;
    APP.settings = {
      shopName: 'Your Electric Shop',
      currency: '₹',
      invoicePrefix: 'INV',
      defaultGST: '18',
      lowStockAlert: '10'
    };
    DataManager.saveSettings(APP.settings);
    this.navigate('settings');
    Toast.show('Settings reset to defaults', 'success');
  },

  // Export
  exportSalesCSV() {
    const headers = ['ID', 'Invoice', 'Date', 'Customer', 'Product', 'Qty', 'UnitPrice', 'GST', 'Total', 'PaymentMode', 'Status'];
    const rows = APP.data.sales.map(s => [
      s.id, s.invoiceNo, Utils.formatDate(s.date), s.customerName, s.productName,
      s.quantity, s.unitPrice, s.gstAmount, s.totalAmount, s.paymentMode, s.paymentStatus
    ]);
    Utils.downloadCSV('sales_export.csv', headers, rows);
    Toast.show('Sales exported!', 'success');
  },

  exportAllCSV() {
    this.exportSalesCSV();
    // Could add more exports here
    Toast.show('All data exported!', 'success');
  },

  // Backup
  async downloadBackup() {
    const backup = {
      version: APP.version,
      date: new Date().toISOString(),
      data: APP.data,
      settings: APP.settings
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `electromanager_backup_${new Date().toISOString().split('T')[0]}.json`;
    link.click();
    URL.revokeObjectURL(link.href);
    Toast.show('Backup downloaded!', 'success');
  },

  showRestoreModal() { this.showModal('restoreModal'); },

  async restoreBackup() {
    const fileInput = document.getElementById('restoreFile');
    if (!fileInput.files[0]) {
      Toast.show('Please select a backup file', 'warning');
      return;
    }

    try {
      const text = await fileInput.files[0].text();
      const backup = JSON.parse(text);

      if (!backup.data) {
        Toast.show('Invalid backup file', 'error');
        return;
      }

      // Restore all data
      for (const [store, items] of Object.entries(backup.data)) {
        if (Array.isArray(items)) {
          await DB.clear(store);
          for (const item of items) {
            await DB.put(store, item);
          }
        }
      }

      // Restore settings
      if (backup.settings) {
        for (const [key, value] of Object.entries(backup.settings)) {
          await DB.put('settings', { id: key, key, value });
        }
      }

      await DataManager.loadAll();
      this.closeModal();
      this.navigate('dashboard');
      Toast.show('Backup restored successfully!', 'success');
    } catch(err) {
      Toast.show('Restore failed: ' + err.message, 'error');
    }
  },

  async clearAllData() {
if (!confirm('⚠️ WARNING: This will DELETE ALL your local data!\n\nThis cannot be undone. Are you sure?')) return;
    if (!confirm('Really sure? All products, sales, customers - everything will be gone.')) return;

    const stores = ['products', 'sales', 'purchases', 'customers', 'suppliers', 'expenses', 'payments', 'returns', 'pendingSync'];
    for (const store of stores) {
      await DB.clear(store);
    }

    APP.data = { products: [], sales: [], purchases: [], customers: [], suppliers: [], expenses: [], payments: [], returns: [], users: [] };
    APP.pendingSync = [];

    this.navigate('dashboard');
    Toast.show('All data cleared!', 'warning');
  }
};

// Close modal on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') app.closeModal();
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) app.closeModal();
});

// Initialize app
app.init();
</script>
